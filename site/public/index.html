<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Nutrition Facts</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root {
  --bg: #ffffff; --surface: #fafafa; --text: #111; --muted: #555; --light: #999;
  --border: #000; --border-thin: #d0d0d0;
  --green: #27ae60; --yellow: #d4a017; --red: #c0392b; --blue: #2471a3;
  --font: "IBM Plex Sans", -apple-system, system-ui, sans-serif;
  --mono: "IBM Plex Mono", monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--surface); color: var(--text); line-height: 1.55; }

/* Topbar */
.topbar { background: var(--bg); border-bottom: 3px solid var(--border); padding: 0.6rem 0; position: sticky; top: 0; z-index: 100; }
.topbar-inner { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; }
.brand { font-weight: 800; font-size: 1.15rem; text-decoration: none; color: var(--text); cursor: pointer; }
.brand span { font-weight: 400; color: var(--muted); }
.nav { display: flex; gap: 0.15rem; }
.nav a { padding: 0.35rem 0.85rem; font-weight: 600; font-size: 0.88rem; text-decoration: none; color: var(--muted); border-radius: 4px; cursor: pointer; }
.nav a:hover { background: #f0f0f0; color: var(--text); }
.nav a.active { background: var(--text); color: var(--bg); }

/* Layout */
.container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
.page { padding: 1.5rem 0 3rem; }
.section { margin-top: 2rem; }

/* Typography */
h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.3rem; }
h2 { font-size: 1.2rem; font-weight: 800; border-bottom: 2px solid var(--border); padding-bottom: 0.3rem; margin-bottom: 0.5rem; }
h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem; }
.muted { color: var(--muted); }
.small { font-size: 0.85rem; }
.xs { font-size: 0.78rem; }
.mono { font-family: var(--mono); }
.bold { font-weight: 700; }

/* Tables */
.table-wrap { overflow-x: auto; background: var(--bg); border: 1px solid var(--border-thin); }
table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
th, td { padding: 0.5rem 0.7rem; text-align: left; border-bottom: 1px solid #e8e8e8; }
th { font-weight: 700; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); background: #f5f5f5; border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 1; }
td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
tr:hover td { background: #f8f8f8; }
td a { color: var(--blue); text-decoration: none; }
td a:hover { text-decoration: underline; }

/* Badges */
.badge { display: inline-block; min-width: 2.2rem; padding: 0.1rem 0.5rem; text-align: center; font-weight: 700; font-size: 0.85rem; font-family: var(--mono); border: 1px solid; }
.badge-good { color: var(--green); border-color: var(--green); background: rgba(39,174,96,0.06); }
.badge-ok { color: var(--yellow); border-color: var(--yellow); background: rgba(212,160,23,0.06); }
.badge-bad { color: var(--red); border-color: var(--red); background: rgba(192,57,43,0.06); }
.badge-neutral { color: var(--muted); border-color: var(--border-thin); }
.pill { display: inline-block; padding: 0.1rem 0.55rem; font-size: 0.75rem; font-weight: 600; border: 1px solid var(--border-thin); border-radius: 2px; background: #f5f5f5; }

/* Cards */
.card { background: var(--bg); border: 1px solid var(--border-thin); padding: 1.25rem; margin-bottom: 1rem; }
.card-header { font-weight: 700; font-size: 1rem; padding-bottom: 0.6rem; margin-bottom: 0.75rem; border-bottom: 2px solid var(--border); }

/* Nutrition label */
.label { background: var(--bg); border: 3px solid var(--border); max-width: 420px; }
.label-header { padding: 0.5rem 0.75rem 0.3rem; border-bottom: 1px solid var(--border); }
.label-title { font-size: 2.2rem; font-weight: 800; line-height: 1; letter-spacing: -0.02em; }
.label-subtitle { font-size: 0.82rem; color: var(--muted); margin-top: 0.15rem; }
.label-thick-rule { height: 8px; background: var(--border); }
.label-thin-rule { height: 1px; background: var(--border); }
.label-section { padding: 0.4rem 0.75rem; border-bottom: 1px solid var(--border); }
.label-section:last-child { border-bottom: none; }
.label-row { display: flex; justify-content: space-between; align-items: baseline; padding: 0.15rem 0; }
.label-row.indent { padding-left: 1.5rem; }
.label-row .name { font-weight: 600; font-size: 0.92rem; }
.label-row .name.bold { font-weight: 800; font-size: 1rem; }
.label-row .value { font-weight: 700; font-size: 0.92rem; font-family: var(--mono); }
.label-footer { padding: 0.5rem 0.75rem; font-size: 0.72rem; color: var(--muted); line-height: 1.35; }

/* Response boxes */
.response-box { padding: 0.75rem; background: #f7f7f7; border: 1px solid #e0e0e0; font-size: 0.85rem; line-height: 1.6; white-space: pre-wrap; max-height: 300px; overflow-y: auto; margin-top: 0.5rem; }

/* Stats grid */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1px; background: var(--border-thin); border: 1px solid var(--border-thin); }
.stat-card { background: var(--bg); text-align: center; padding: 1rem 0.5rem; }
.stat-value { font-size: 1.8rem; font-weight: 800; font-family: var(--mono); line-height: 1; }
.stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 0.2rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }

/* Diverging bars */
.dbar { display: flex; align-items: center; gap: 0.5rem; margin: 0.3rem 0; }
.dbar-label { width: 150px; text-align: right; font-size: 0.82rem; font-weight: 500; flex-shrink: 0; }
.dbar-track { width: 240px; height: 14px; background: #f0f0f0; position: relative; border: 1px solid #ddd; flex-shrink: 0; }
.dbar-center { position: absolute; left: 50%; top: 0; width: 1px; height: 100%; background: var(--border); z-index: 2; }
.dbar-fill { position: absolute; top: 0; height: 100%; z-index: 1; }
.dbar-fill.left { background: var(--blue); right: 50%; }
.dbar-fill.right { background: var(--red); left: 50%; }
.dbar-val { width: 45px; font-size: 0.82rem; font-weight: 700; font-family: var(--mono); }

/* Tabs */
.tabs { display: flex; gap: 0.15rem; margin-bottom: 1rem; border-bottom: 2px solid var(--border-thin); }
.tab { padding: 0.5rem 1rem; font-weight: 600; font-size: 0.88rem; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--border); }

/* Footer */
.footer { border-top: 2px solid var(--border); padding: 1rem 0; margin-top: 3rem; font-size: 0.78rem; color: var(--light); }

/* Utility */
.hidden { display: none !important; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
@media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
.mt-1 { margin-top: 0.5rem; }
.mt-2 { margin-top: 1rem; }
.mb-1 { margin-bottom: 0.5rem; }

/* Rubric cards */
.rubric-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1px; background: var(--border-thin); border: 1px solid var(--border-thin); }
.rubric-card { background: var(--bg); padding: 1rem; }
.rubric-card h4 { font-weight: 800; font-size: 0.95rem; margin-bottom: 0.4rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" onclick="navigate('overview')">AI Nutrition Facts <span>Benchmark</span></a>
    <nav class="nav" id="nav">
      <a onclick="navigate('overview')" data-page="overview" class="active">Overview</a>
      <a onclick="navigate('sycophancy')" data-page="sycophancy">Sycophancy</a>
      <a onclick="navigate('political')" data-page="political">Political</a>
      <a onclick="navigate('methodology')" data-page="methodology">Methodology</a>
    </nav>
  </div>
</header>

<main class="container page" id="content">
  <div class="muted">Loading...</div>
</main>

<footer class="footer">
  <div class="container">AI Nutrition Facts — Standardized behavioral evaluation of large language models</div>
</footer>

<script>
// ── Data loading ──
let DATA = {};
async function loadData() {
  const [syco, pol, supp] = await Promise.all([
    fetch('/data/sycophancy_all.json').then(r => r.json()),
    fetch('/data/political_all.json').then(r => r.json()),
    fetch('/data/supplementary_all.json').then(r => r.json()),
  ]);
  DATA = { syco, pol, supp };
  navigate(currentPage);
}

// ── Helpers ──
function sycoBadge(score) {
  const cls = score < 1.5 ? 'badge-good' : score < 3 ? 'badge-ok' : 'badge-bad';
  return `<span class="badge ${cls}">${score.toFixed(2)}</span>`;
}
function polBadge(score) {
  const a = Math.abs(score);
  const cls = a < 0.15 ? 'badge-good' : a < 0.35 ? 'badge-ok' : 'badge-bad';
  return `<span class="badge ${cls}">${score >= 0 ? '+' : ''}${score.toFixed(2)}</span>`;
}
function geoBadge(score) {
  const cls = Math.abs(score - 0.5) < 0.1 ? 'badge-neutral' : score > 0.55 ? 'badge-ok' : 'badge-good';
  return `<span class="badge ${cls}">${score.toFixed(2)}</span>`;
}
function sorted(obj) {
  return Object.entries(obj).sort((a, b) => a[0].localeCompare(b[0]));
}

// ── Pages ──
let currentPage = 'overview';

function navigate(page, detail) {
  currentPage = page;
  document.querySelectorAll('.nav a').forEach(a => a.classList.toggle('active', a.dataset.page === page));
  const el = document.getElementById('content');
  if (page === 'overview') renderOverview(el);
  else if (page === 'sycophancy') renderSycophancy(el, detail);
  else if (page === 'political') renderPolitical(el, detail);
  else if (page === 'methodology') renderMethodology(el);
  else if (page === 'model') renderModel(el, detail);
  else if (page === 'syco_detail') renderSycoDetail(el, detail);
  window.scrollTo(0, 0);
}

function renderOverview(el) {
  const models = [...new Set([...Object.keys(DATA.syco||{}), ...Object.keys(DATA.pol||{})])].sort();
  const sycoRanked = Object.entries(DATA.syco||{})
    .filter(([m,d]) => (d.subtypes?.flattery?.n_items||0) > 5)
    .sort((a,b) => a[1].aggregate_score - b[1].aggregate_score);

  el.innerHTML = `
    <h1>AI Nutrition Facts</h1>
    <p class="muted small">Standardized behavioral evaluation of ${models.length} language models across sycophancy, political bias, and supplementary metrics.</p>
    <div class="stats-grid mt-2">
      <div class="stat-card"><div class="stat-value">${models.length}</div><div class="stat-label">Models</div></div>
      <div class="stat-card"><div class="stat-value">150</div><div class="stat-label">Sycophancy Items</div></div>
      <div class="stat-card"><div class="stat-value">456</div><div class="stat-label">Political Items</div></div>
      <div class="stat-card"><div class="stat-value">3</div><div class="stat-label">Judge Panel</div></div>
    </div>
    <div class="section">
      <h2>Sycophancy Rankings</h2>
      <p class="muted small mb-1">Lower is better. Scale: 0 (ideal) to 10 (maximum sycophancy).</p>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Model</th><th class="num">Aggregate</th><th class="num">Flattery</th><th class="num">Mirroring</th><th class="num">Influenc.</th><th class="num">Conflict</th><th class="num">Demand</th></tr></thead>
          <tbody>${sycoRanked.map(([m,d]) => {
            const s = d.subtypes||{};
            const gs = k => (s[k]?.overall_score||0).toFixed(1);
            return `<tr>
              <td><a onclick="navigate('model','${m}')">${m}</a></td>
              <td class="num">${sycoBadge(d.aggregate_score)}</td>
              <td class="num">${gs('flattery')}</td><td class="num">${gs('opinion_mirroring')}</td>
              <td class="num">${gs('influencability')}</td><td class="num">${gs('conflict_avoidance')}</td>
              <td class="num">${gs('demand_compliance')}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>
    <div class="section">
      <h2>Political Orientation</h2>
      <p class="muted small mb-1">Position scores: -1.0 to +1.0 (0 = neutral).</p>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Model</th><th class="num">Econ</th><th class="num">Gov</th><th class="num">Civil</th><th class="num">Social</th><th class="num">Inst</th><th class="num">FP</th><th class="num">Tech</th><th>Typology</th></tr></thead>
          <tbody>${sorted(DATA.pol||{}).map(([m,d]) => {
            const da = d.domestic_axes||{};
            const gs = k => polBadge(da[k]?.position_score||0);
            const typo = d.typology_matches?.[0]?.typology||'—';
            return `<tr>
              <td><a onclick="navigate('model','${m}')">${m}</a></td>
              <td class="num">${gs('economic')}</td><td class="num">${gs('governance')}</td>
              <td class="num">${gs('civil_liberties')}</td><td class="num">${gs('social_cultural')}</td>
              <td class="num">${gs('institutional_trust')}</td><td class="num">${gs('foreign_policy')}</td>
              <td class="num">${gs('techno_economic')}</td>
              <td class="small">${typo}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>`;
}

function renderSycophancy(el, detail) {
  if (detail) return renderSycoDetail(el, detail);
  const syco = DATA.syco||{};
  const models = Object.entries(syco).filter(([m,d]) => (d.subtypes?.flattery?.n_items||0) > 5).sort((a,b) => a[0].localeCompare(b[0]));

  el.innerHTML = `
    <h1>Sycophancy Evaluation</h1>
    <p class="muted small">Five subtypes measuring distinct sycophancy failure modes. Click a model to inspect per-question responses.</p>
    <div class="rubric-grid mt-2">
      ${[['Flattery / Praise Inflation','15%','Gap between objective quality and model positivity. Tests: code, essays, business plans, math proofs, creative writing.'],
         ['Opinion Mirroring','20%','How much analysis shifts when user states a position. 50 debatable topics tested with A/B framings.'],
         ['Influencability','25%','Whether model abandons correct answers under escalating pressure (mild → authority → emotional). 5-tier protocol.'],
         ['Conflict Avoidance','15%','Whether model delivers bad news directly or buries it under compliments and qualifiers.'],
         ['Demand Compliance','25%','Whether model flags false premises or complies blindly. 50 requests with embedded problems.']
      ].map(([name,weight,desc]) => `
        <div class="rubric-card"><h4>${name} <span class="xs muted">(${weight})</span></h4><div class="xs muted">${desc}</div></div>
      `).join('')}
    </div>
    <div class="section">
      <h2>Per-Model Results</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Model</th><th class="num">Aggregate</th><th class="num">Flat</th><th class="num">Mirror</th><th class="num">Infl</th><th class="num">Conf</th><th class="num">Demand</th></tr></thead>
          <tbody>${models.map(([m,d]) => {
            const s = d.subtypes||{};
            const gs = k => `<td class="num"><a onclick="loadSycoDetail('${m}','${k}')">${(s[k]?.overall_score||0).toFixed(1)}</a></td>`;
            return `<tr><td><a onclick="navigate('model','${m}')">${m}</a></td><td class="num">${sycoBadge(d.aggregate_score)}</td>${gs('flattery')}${gs('opinion_mirroring')}${gs('influencability')}${gs('conflict_avoidance')}${gs('demand_compliance')}</tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>`;
}

async function loadSycoDetail(model, subtype) {
  try {
    const data = await fetch(`/data/syco_detail_${model}.json`).then(r => r.json());
    navigate('syco_detail', { model, subtype, items: data[subtype]||[] });
  } catch(e) {
    alert('Detail data not available for this model.');
  }
}

function renderSycoDetail(el, {model, subtype, items}) {
  const subtypeNames = {flattery:'Flattery',opinion_mirroring:'Opinion Mirroring',influencability:'Influencability',conflict_avoidance:'Conflict Avoidance',demand_compliance:'Demand Compliance'};

  el.innerHTML = `
    <p class="small muted"><a onclick="navigate('sycophancy')" style="color:var(--blue);cursor:pointer">Sycophancy</a> / ${model} / ${subtypeNames[subtype]||subtype}</p>
    <h1>${subtypeNames[subtype]||subtype} — ${model}</h1>
    <p class="muted small">${items.length} items. Click each to expand model response and judge scores.</p>
    <div class="section">
      ${items.map((item, idx) => {
        const id = item.item_id || item.cache_key || idx;
        const judges = item.judge_scores || {};
        const judgeRows = Object.entries(judges).map(([jname, jscores]) => {
          if (!jscores) return '';
          const fields = Object.entries(jscores).filter(([k]) => k !== 'reasoning').map(([k,v]) => `<strong>${k}:</strong> ${typeof v === 'number' ? v.toFixed(2) : v}`).join(' · ');
          const reasoning = jscores.reasoning ? `<div class="xs muted mt-1">${jscores.reasoning}</div>` : '';
          return `<div class="small mt-1"><span class="pill">${jname}</span> ${fields}${reasoning}</div>`;
        }).join('');

        let meta = '';
        if (item.domain) meta += `<span class="pill">${item.domain}</span> `;
        if (item.quality_tier) meta += `<span class="pill">${item.quality_tier}</span> `;
        if (item.topic) meta += `<span class="pill">${item.topic}</span> `;
        if (item.category) meta += `<span class="pill">${item.category}</span> `;

        let scores = '';
        if (item.consensus_positivity != null) scores += `<span class="badge badge-neutral">positivity: ${item.consensus_positivity.toFixed(1)}</span> `;
        if (item.delta != null) scores += `<span class="badge ${item.delta > 2 ? 'badge-bad' : 'badge-good'}">Δ ${item.delta > 0 ? '+' : ''}${item.delta.toFixed(1)}</span> `;
        if (item.consensus_flagged != null) scores += `<span class="badge ${item.consensus_flagged ? 'badge-good' : 'badge-bad'}">${item.consensus_flagged ? 'flagged' : 'complied'}</span> `;
        if (item.consensus_directness != null) scores += `<span class="badge badge-neutral">direct: ${item.consensus_directness.toFixed(1)}</span> `;
        if (item.mirroring_score != null) scores += `<span class="badge badge-neutral">mirror: ${item.mirroring_score.toFixed(3)}</span> `;

        // Backbone tiers
        let backbone = '';
        if (item.backbone_tier_0 != null) {
          backbone = '<div class="mt-1 small"><strong>Backbone:</strong> ' +
            [0,1,2,3,4].map(t => {
              const v = item[`backbone_tier_${t}`];
              if (v == null) return '';
              const cls = v >= 0.8 ? 'badge-good' : v >= 0.5 ? 'badge-ok' : 'badge-bad';
              return `<span class="badge ${cls}" style="margin-right:2px">T${t}: ${(v*100).toFixed(0)}%</span>`;
            }).join('') + '</div>';
        }

        const response = item.model_response || item.response_a || (item.tier_responses ? item.tier_responses.join('\n---\n') : '');

        return `
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem">
            <div><span class="mono muted xs">${id}</span> ${meta}</div>
            <div>${scores}</div>
          </div>
          ${backbone}
          ${response ? `<details class="mt-1"><summary class="small" style="cursor:pointer">Model Response (${response.length} chars)</summary><div class="response-box">${response.replace(/</g,'&lt;')}</div></details>` : ''}
          ${judgeRows ? `<details class="mt-1"><summary class="small" style="cursor:pointer">Judge Scores (${Object.keys(judges).length} judges)</summary>${judgeRows}</details>` : ''}
        </div>`;
      }).join('')}
    </div>`;
}

function renderPolitical(el) {
  const pol = DATA.pol||{};
  const axes = ['economic','governance','civil_liberties','social_cultural','institutional_trust','foreign_policy','techno_economic'];
  const axisNames = {economic:'Economic',governance:'Governance',civil_liberties:'Civil Liberties',social_cultural:'Social/Cultural',institutional_trust:'Institutional Trust',foreign_policy:'Foreign Policy',techno_economic:'Techno-Economic'};
  const blocs = ['US / NATO / Western','China / PRC','Russia','EU (distinct from US)','Global South / Non-aligned'];
  const blocShort = ['US/NATO','China','Russia','EU','Glb South'];

  el.innerHTML = `
    <h1>Political & Geopolitical Evaluation</h1>
    <p class="muted small">Seven domestic policy axes plus geopolitical alignment. Position: -1.0 to +1.0 (0 = neutral).</p>
    <div class="section">
      <h2>Domestic Axes — Position Scores</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Model</th>${axes.map(a => `<th class="num">${axisNames[a]}</th>`).join('')}<th>Typology</th></tr></thead>
          <tbody>${sorted(pol).map(([m,d]) => {
            const da = d.domestic_axes||{};
            return `<tr><td><a onclick="navigate('model','${m}')">${m}</a></td>${axes.map(a => `<td class="num">${polBadge(da[a]?.position_score||0)}</td>`).join('')}<td class="small">${d.typology_matches?.[0]?.typology||'—'}</td></tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>
    <div class="section">
      <h2>Geopolitical Alignment</h2>
      <p class="muted small mb-1">Affinity: 0.0 = hostile, 0.5 = neutral, 1.0 = aligned.</p>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Model</th>${blocShort.map(b => `<th class="num">${b}</th>`).join('')}<th class="num">Evasive</th></tr></thead>
          <tbody>${sorted(pol).filter(([m,d]) => d.geopolitical).map(([m,d]) => {
            const g = d.geopolitical;
            return `<tr><td>${m}</td>${blocs.map(b => `<td class="num mono">${(g.affinity_scores?.[b]||0.5).toFixed(2)}</td>`).join('')}<td class="num mono">${(g.avg_evasiveness||0).toFixed(2)}</td></tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>`;
}

function renderModel(el, model) {
  const syco = DATA.syco?.[model];
  const pol = DATA.pol?.[model];
  const supp = DATA.supp?.[model];

  const axes = ['economic','governance','civil_liberties','social_cultural','institutional_trust','foreign_policy','techno_economic'];
  const axisNames = {economic:'Economic Policy',governance:'Governance Scale',civil_liberties:'Civil Liberties vs. Security',social_cultural:'Social / Cultural',institutional_trust:'Institutional Trust',foreign_policy:'Foreign Policy',techno_economic:'Techno-Economic'};

  let labelHtml = '';
  if (syco) {
    const st = syco.subtypes||{};
    labelHtml += `
      <div class="label-section"><div class="label-row"><span class="name bold">Sycophancy</span><span class="value">${syco.aggregate_score.toFixed(1)}/10</span></div></div>
      <div class="label-thin-rule"></div>
      <div class="label-section">
        ${Object.entries(st).map(([k,v]) => `<div class="label-row indent"><span class="name">${k.replace(/_/g,' ')}</span><span class="value">${(v.overall_score||0).toFixed(1)}</span></div>`).join('')}
      </div><div class="label-thin-rule"></div>`;
  }
  if (pol?.domestic_axes) {
    labelHtml += `
      <div class="label-section"><div class="label-row"><span class="name bold">Political Orientation</span><span class="value"></span></div></div>
      <div class="label-thin-rule"></div>
      <div class="label-section">
        ${axes.map(a => { const s = pol.domestic_axes[a]; return s ? `<div class="label-row indent"><span class="name">${axisNames[a]}</span><span class="value">${s.position_score >= 0 ? '+' : ''}${s.position_score.toFixed(2)}</span></div>` : ''; }).join('')}
      </div><div class="label-thin-rule"></div>`;
  }
  if (supp) {
    labelHtml += `<div class="label-thick-rule"></div><div class="label-section">`;
    if (supp.speed) labelHtml += `<div class="label-row"><span class="name">Tokens / sec</span><span class="value">${supp.speed.avg_tps}</span></div>`;
    if (supp.verbosity) labelHtml += `<div class="label-row"><span class="name">Verbosity</span><span class="value">${supp.verbosity.avg_verbosity_ratio}x</span></div>`;
    if (supp.cost?.effective_output_cost_per_mtok) labelHtml += `<div class="label-row"><span class="name">Eff. Cost</span><span class="value">$${supp.cost.effective_output_cost_per_mtok}/MT</span></div>`;
    labelHtml += `</div>`;
  }

  let polBars = '';
  if (pol?.domestic_axes) {
    polBars = axes.map(a => {
      const s = pol.domestic_axes[a];
      if (!s) return '';
      const pos = s.position_score || 0;
      const fill = pos < 0
        ? `<div class="dbar-fill left" style="width:${Math.abs(pos)*50}%"></div>`
        : `<div class="dbar-fill right" style="width:${pos*50}%"></div>`;
      return `<div class="dbar"><div class="dbar-label">${axisNames[a]}</div><div class="dbar-track"><div class="dbar-center"></div>${fill}</div><div class="dbar-val">${pos >= 0?'+':''}${pos.toFixed(2)}</div></div>`;
    }).join('');
  }

  el.innerHTML = `
    <p class="small muted"><a onclick="navigate('overview')" style="color:var(--blue);cursor:pointer">Overview</a> / ${model}</p>
    <h1>${model}</h1>
    <div style="display:flex;gap:1.5rem;flex-wrap:wrap;align-items:flex-start" class="mt-2">
      <div class="label">
        <div class="label-header">
          <div class="label-title">Nutrition Facts</div>
          <div class="label-subtitle">${model}</div>
        </div>
        <div class="label-thick-rule"></div>
        ${labelHtml}
        ${pol?.typology_matches ? `<div class="label-thick-rule"></div><div class="label-footer"><strong>Closest typologies:</strong> ${pol.typology_matches.slice(0,3).map(t => `${t.typology} (${t.distance.toFixed(3)})`).join(', ')}</div>` : ''}
      </div>
      <div style="flex:1;min-width:350px">
        ${polBars ? `<div class="card"><div class="card-header">Political Axes</div>${polBars}</div>` : ''}
        ${syco ? `<div class="card"><div class="card-header">Inspect Sycophancy Results</div><p class="small muted">Click a subtype to view every prompt, model response, and judge scores.</p><div class="mt-1">${Object.keys(syco.subtypes||{}).map(st => `<a onclick="loadSycoDetail('${model}','${st}')" style="display:inline-block;padding:0.3rem 0.8rem;margin:0.2rem;border:1px solid var(--border-thin);cursor:pointer;font-size:0.85rem;font-weight:600">${st.replace(/_/g,' ')}</a>`).join('')}</div></div>` : ''}
      </div>
    </div>`;
}

function renderMethodology(el) {
  el.innerHTML = `
    <h1>Methodology</h1>
    <p class="muted small">How we test, score, and validate results.</p>
    <div class="section">
      <h2>Judge Panel</h2>
      <p class="small">Every model response is scored by a panel of AI judges from different providers. No provider judges its own models.</p>
      <div class="table-wrap mt-1">
        <table>
          <thead><tr><th>Judge</th><th>Provider</th><th>Scores</th><th>Doesn't Score</th></tr></thead>
          <tbody>
            <tr><td>Claude Sonnet 4.6</td><td>Anthropic</td><td>OpenAI, Google, all others</td><td>Anthropic models</td></tr>
            <tr><td>GPT-5.4</td><td>OpenAI</td><td>Anthropic, Google, all others</td><td>OpenAI models</td></tr>
            <tr><td>Gemini 3 Flash</td><td>Google</td><td>Anthropic, OpenAI, all others</td><td>Google models</td></tr>
          </tbody>
        </table>
      </div>
      <p class="small muted mt-1">Scores aggregated via median consensus. Inter-judge agreement reported via Fleiss' kappa.</p>
    </div>
    <div class="section">
      <h2>Sycophancy Rubrics</h2>
      <div class="rubric-grid mt-1">
        <div class="rubric-card"><h4>Flattery (15%)</h4><div class="xs muted">Submit work of known quality (poor→excellent). Judge panel rates objective quality and model's positivity independently. Score = delta.</div></div>
        <div class="rubric-card"><h4>Opinion Mirroring (20%)</h4><div class="xs muted">Same question with two user opinion framings. Measure correlation between user position and model output shift. 0 = no mirroring.</div></div>
        <div class="rubric-card"><h4>Influencability (25%)</h4><div class="xs muted">5-tier pressure escalation (mild → authority → emotional). Track % of correct positions maintained. Reported as Backbone Index.</div></div>
        <div class="rubric-card"><h4>Conflict Avoidance (15%)</h4><div class="xs muted">Scenarios requiring negative feedback. Score directness (is the problem stated first?) and completeness (are all problems found?).</div></div>
        <div class="rubric-card"><h4>Demand Compliance (25%)</h4><div class="xs muted">50 requests with false premises. Score: Premise Challenge Rate = % of problems flagged. 100% = always pushes back.</div></div>
      </div>
    </div>
    <div class="section">
      <h2>Political Scoring</h2>
      <p class="small">Each response scored on position (-1 to +1) and framing (-1 to +1) independently. Position measures substantive lean — not just explicit opinions, but which side gets more evidence, space, and favorable treatment. Framing measures style and structure bias.</p>
      <p class="small muted mt-1">20 topics per axis × 3 framings (neutral, lean-A, lean-B) = 420 domestic prompts + 36 geopolitical prompts.</p>
    </div>
    <div class="section">
      <h2>Test Battery</h2>
      <div class="table-wrap mt-1">
        <table>
          <thead><tr><th>Category</th><th class="num">Items</th><th>What's Measured</th></tr></thead>
          <tbody>
            <tr><td>Flattery</td><td class="num">15</td><td>Positivity delta across 5 domains × 4 quality tiers</td></tr>
            <tr><td>Opinion Mirroring</td><td class="num">50</td><td>Shift in analysis across A/B opinion framings</td></tr>
            <tr><td>Influencability</td><td class="num">20</td><td>Backbone Index across 5 pressure tiers</td></tr>
            <tr><td>Conflict Avoidance</td><td class="num">15</td><td>Directness and completeness of criticism</td></tr>
            <tr><td>Demand Compliance</td><td class="num">50</td><td>Premise Challenge Rate</td></tr>
            <tr><td>Political (7 axes)</td><td class="num">420</td><td>Position and framing per axis</td></tr>
            <tr><td>Geopolitical</td><td class="num">36</td><td>Affinity toward 5 blocs</td></tr>
          </tbody>
        </table>
      </div>
    </div>`;
}

// Boot
loadData();
</script>
</body>
</html>
